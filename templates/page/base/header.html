<header class="site-header">
  <nav class="navbar navbar-expand-lg">
    <div class="container">
      <a class="navbar-brand d-flex align-items-center gap-3" href="{{ url_for('landing_page') }}">
        <span class="navbar-brand-copy d-flex">
          <span class="navbar-brand-title">4UrClass</span>
          <span class="navbar-brand-subtitle">Quiz practice for ambitious learners</span>
        </span>
      </a>

      <button
        class="navbar-toggler border-0 shadow-none"
        type="button"
        data-bs-toggle="collapse"
        data-bs-target="#navbarNav"
        aria-controls="navbarNav"
        aria-expanded="false"
        aria-label="Toggle navigation"
      >
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto align-items-lg-center gap-lg-1">
          <li class="nav-item">
            <a class="nav-link" href="{{ url_for('bank_page') }}">Try a Quiz</a>
          </li>

          <li class="nav-item">
            <a class="nav-link" href="{{ url_for('landing_page') }}#newsletter">Newsletter</a>
          </li>

          <li class="nav-item">
            {% if session.get('user_login') %}
              <a class="nav-link" href="{{ url_for('account_page') }}">Dashboard</a>
            {% else %}
              <a class="nav-link" href="{{ url_for('login') }}">Login</a>
            {% endif %}
          </li>

          <li class="nav-item ms-lg-2">
            {% if session.get('user_login') %}
              <a class="btn btn-brand" href="{{ url_for('account_page') }}">User Dashboard</a>
            {% else %}
              <a class="btn btn-brand" href="{{ url_for('autoquiz_page') }}">Create a Quiz</a>
            {% endif %}
          </li>
        </ul>
      </div>
    </div>
  </nav>
</header>
