<script>
const retryInterval = 5000;
const timeout = 60000;
const startTime = Date.now();
const taskUrl = "{{ task_url }}";

function isWaiting(state) {
  return state === 'pending' || state === 'processing';
}

function showReadyState() {
  const loadingSection = document.getElementById('loading-section');
  const readySection = document.getElementById('ready-section');
  if (loadingSection) loadingSection.style.display = 'none';
  if (readySection) readySection.style.display = 'block';
}

function failAndRedirect(message) {
  console.error('Task failed:', message);
  window.location.href = '/error/503';
}

function checkTaskStatus(url) {
  fetch(url, { method: 'GET', headers: { 'Content-Type': 'application/json' } })
    .then(resp => {
      if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
      return resp.json();
    })
    .then(data => {
      if (data.error) throw new Error(data.error);

      const state = (data.state || '').toLowerCase();

      if (state === 'success') {
        showReadyState();
        return;
      }

      if (isWaiting(state)) {
        if (Date.now() - startTime < timeout) {
          setTimeout(() => checkTaskStatus(url), retryInterval);
        } else {
          throw new Error('Timeout waiting for task');
        }
        return;
      }

      failAndRedirect(data.msg || 'Task failed.');
    })
    .catch(err => {
      console.error('Task-status check failed:', err);
      failAndRedirect(err.message || 'Unable to check task status.');
    });
}

setTimeout(() => checkTaskStatus(taskUrl), 3000);
</script>
