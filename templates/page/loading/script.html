<script>
/* ------------------------------------------------------------------
   1.  Back-end now returns states:  pending | processing | success |
       fail | revoked | unknown
   2.  We treat   pending & processing  → keep polling (202)
                 success               → show “ready”
                 everything else       → go to error page
------------------------------------------------------------------- */

const retryInterval = 5000;   // 5 seconds between retries   ★ was “1”
const timeout       = 60000;  // 1-minute overall timeout
const startTime     = Date.now();
const taskUrl       = "{{ task_url }}";   // passed in from template

function isWaiting(state) {
  // ★ new helper – covers both “pending” and “processing”
  return state === 'pending' || state === 'processing';
}

function checkTaskStatus(url) {
  fetch(url, { method: 'GET', headers: { 'Content-Type': 'application/json' } })
    .then(resp => {
      if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
      return resp.json();
    })
    .then(data => {
      // API-level error key
      if (data.error) throw new Error(data.error);

      const state = (data.state || '').toLowerCase();   // normalise

      if (state === 'success') {
        // ✔ finished
        document.getElementById('loading-section').style.display = 'none';
        document.getElementById('ready-section').style.display   = 'block';
        return;
      }

      if (isWaiting(state)) {
        // ⏳ still working – retry while within timeout
        if (Date.now() - startTime < timeout) {
          setTimeout(() => checkTaskStatus(url), retryInterval);
        } else {
          throw new Error('Timeout waiting for task');
        }
        return;
      }

      // ✗ anything else = failure (fail / revoked / unknown)
      alert(data.msg || 'Task failed.');
      window.location.href = '/error/503';
    })
    .catch(err => {
      console.error('Task-status check failed:', err);
      window.location.href = '/error/503';
    });
}

// initial poll after 10 s (unchanged)
setTimeout(() => checkTaskStatus(taskUrl), 10000);
</script>
