      <!-- Form Section -->
      <div class="col-md-6">
        <h3 class="fw-bold mb-4 text-center" style="color: #0d6efd; font-size: 2rem;">Auto-Quiz Generator</h3>
        <form method="POST">
          <div class="mb-3">
            <label for="topic" class="form-label">Enter Topic</label>
            <input type="text" class="form-control" id="topic" name="topic" placeholder="e.g., Project Management" required>
          </div>
          <div class="mb-3">
            <label for="description" class="form-label">Description (Optional)</label>
            <textarea class="form-control" id="description" name="description" rows="3" placeholder="Add a short description of the topic"></textarea>
          </div>
          <div class="mb-3">
            <label for="numQuestions" class="form-label">Number of Questions</label>
            <select class="form-select" id="numQuestions" name="numQuestions" required>
              <option value="5">5</option>
              <option value="10">10</option>
              <option value="15">15</option>
              <option value="20">20</option>
            </select>
          </div>
          <div class="mb-3">
            <label for="level" class="form-label">Difficulty Level</label>
            <select class="form-select" id="level" name="level" required>
              <option value="Beginner">Beginner</option>
              <option value="Intermediate">Intermediate</option>
              <option value="Expert">Expert</option>
            </select>
          </div>
          <div class="mb-3 form-check">
            <input type="checkbox" class="form-check-input" id="agreeTnC" name="agreeTnC" required>
            <label class="form-check-label" for="agreeTnC">
              I agree to the <a href="/tnc" target="_blank">Terms and Conditions</a>.
            </label>
          </div>
          <div class="d-grid">
            {% if loggedin %}
              <button type="submit" class="btn btn-primary btn-lg">Generate Quiz <small>(5 Credits)</small></button>
            {% else %}
              <!-- User is not logged in: disable the button and show message -->
              <button type="submit" class="btn btn-primary btn-lg" disabled>Generate Quiz</button>
              <p class="text-danger mt-2">Please <a href="{{ url_for('login') }}">log in</a> to generate a quiz.</p>
            {% endif %}
          </div>
        </form>
      </div>
    </div>
  </div>
</section>

<!-- Optional CSS for responsiveness -->
<style>
  @media (max-width: 768px) {
    img {
      max-width: 100%;
      height: auto;
    }
  }
</style>
{% endblock %}
