{% extends "page/base/base.html" %}
{% block title %}Error{% endblock %}
{% block content %}
<section class="page-section">
  <div class="container">
    <div class="surface-panel error-card text-center">
      <span class="section-kicker mb-3">Service Status</span>
      <h1 class="error-title mb-3">Service unavailable.</h1>
      <p class="section-subheading mx-auto mb-4">
        The platform is temporarily unavailable. Please refresh in a moment or contact support if the problem continues.
      </p>
      <div class="error-art mb-4">
        <img src="{{ url_for('static', filename='images/error/503 Error Service Unavailable-cuate.png') }}" alt="Service Unavailable" class="img-fluid mx-auto d-block" style="max-width: 420px;">
      </div>
      <div class="d-flex justify-content-center flex-wrap gap-2">
        <a href="/" class="btn btn-brand">Go to Homepage</a>
        <a href="{{ url_for('contact_page') }}" class="btn btn-ghost">Contact Support</a>
      </div>
    </div>
  </div>
</section>
{% endblock %}
