{% extends "page/base/base.html" %}
{% block title %}Contact Us - 4UrClass{% endblock %}
{% block content %}
<section class="page-section">
  <div class="container">
    <div class="row contact-layout">
      <div class="col-lg-5 contact-art text-center">
        <div class="surface-panel p-4 p-lg-5">
          <img src="{{ url_for('static', filename='images/contact/Questions-rafiki.png') }}" alt="Contact Us" class="img-fluid mx-auto d-block">
        </div>
      </div>

      <div class="col-lg-7">
        <div class="surface-panel contact-form-card">
          <span class="section-kicker mb-3">Support</span>
          <h1 class="section-heading h2 mb-3">Send a message to the team.</h1>
          <p class="section-subheading mb-4">
            Use this form for product questions, account issues, or anything blocking your use of the platform.
          </p>

          <form method="POST" action="/contact">
            <div class="mb-3">
              <label for="name" class="form-label">Your Name</label>
              <input type="text" class="form-control" id="name" name="name" placeholder="Enter your full name" required>
            </div>
            <div class="mb-3">
              <label for="email" class="form-label">Your Email</label>
              <input type="email" class="form-control" id="email" name="email" placeholder="Enter your email address" required>
            </div>
            <div class="mb-3">
              <label for="subject" class="form-label">Subject</label>
              <input type="text" class="form-control" id="subject" name="subject" placeholder="Enter the subject of your message" required>
            </div>
            <div class="mb-4">
              <label for="message" class="form-label">Your Message</label>
              <textarea class="form-control" id="message" name="message" rows="5" placeholder="Write your message here" required></textarea>
            </div>
            <div class="d-grid">
              <button type="submit" class="btn btn-brand btn-lg">Send Message</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</section>
{% endblock %}
